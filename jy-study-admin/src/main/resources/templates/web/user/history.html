<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浏览记录 - 课程学习平台</title>
    <!-- 引入基础样式 -->
    <link href="/css/bootstrap-v4/bootstrap.min.css" rel="stylesheet">
    <link href="/css/font-awesome.min.css" rel="stylesheet">
    <link th:href="@{/css/animate.min.css}" rel="stylesheet"/>
    <link th:href="@{/css/style.min.css}" rel="stylesheet"/>
    <link th:href="@{/ruoyi/css/ry-ui.css}" rel="stylesheet"/>
    <link th:href="@{/css/web-common.css}" rel="stylesheet"/>
    <style>
        body {
            background-color: #f8f9fa;
            font-family: "Microsoft YaHei", sans-serif;
        }
        
        .navbar {
            box-shadow: 0 2px 4px rgba(0,0,0,.08);
        }

        .history-container {
            padding: 40px 0;
            min-height: calc(100vh - 56px - 116px); /* 减去导航栏和页脚的高度 */
        }
        
        .history-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 10px rgba(0,0,0,.05);
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .history-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
            margin: 0;
        }
        
        /* 表格样式 */
        .history-table {
            margin-top: 20px;
            margin-bottom: 40px;
        }
        
        .history-table .table {
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 10px rgba(0,0,0,.05);
        }
        
        .history-table .table thead th {
            background-color: #f8f9fa;
            border-top: none;
            border-bottom: 2px solid #e9ecef;
            color: #495057;
            font-weight: 600;
            padding: 12px 15px;
        }
        
        .history-table .table tbody td {
            padding: 12px 15px;
            vertical-align: middle;
        }
        
        .badge-course {
            background-color: #5b73e8;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: 500;
        }
        
        .badge-article {
            background-color: #4ac1bd;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: 500;
        }
        
        .btn-view {
            border-radius: 20px;
            padding: 5px 15px;
            font-size: 0.85rem;
        }
        
        .btn-view-course {
            background-color: #5b73e8;
            border-color: #5b73e8;
        }
        
        .btn-view-article {
            background-color: #4ac1bd;
            border-color: #4ac1bd;
        }
        
        .empty-history {
            padding: 30px;
            text-align: center;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 10px rgba(0,0,0,.05);
        }
        
        .empty-history i {
            font-size: 48px;
            color: #dee2e6;
            margin-bottom: 15px;
            display: block;
        }
        
        .empty-history p {
            color: #6c757d;
            font-size: 16px;
        }
        
        .footer {
            background: #343a40;
            color: white;
            padding: 40px 0;
        }
        
        .back-btn {
            margin-right: 10px;
            color: #5b73e8;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            color: #4559c9;
            text-decoration: none;
        }
        
        /* 分页样式 */
        .pagination-container {
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }
        
        .pagination .page-item.active .page-link {
            background-color: #5b73e8;
            border-color: #5b73e8;
        }
        
        .pagination .page-link {
            color: #5b73e8;
        }
        
        .pagination .page-link:hover {
            color: #4559c9;
        }
        
        /* 内容摘要样式 */
        .content-summary {
            max-height: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            color: #6c757d;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        
        /* 分区标题 */
        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
            margin: 30px 0 15px 0;
            padding-left: 15px;
            border-left: 4px solid #5b73e8;
        }
        
        .article-section .section-title {
            border-left-color: #4ac1bd;
        }
    </style>
</head>
<body>
    <!-- 1. 首先加载 jQuery -->
    <script th:src="@{/js/jquery.min.js}"></script>
    
    <!-- 3. 然后加载 Bootstrap 的 JS -->
    <script th:src="@{/js/bootstrap.min.js}"></script>
    
    <!-- 4. 加载 Layer 弹窗组件 -->
    <script th:src="@{/ajax/libs/layer/layer.min.js}"></script>
    
    <!-- 6. 加载公共JS -->
    <script th:src="@{/js/common.js}"></script>
    
    <!-- 7. 定义全局变量 -->
    <script th:inline="javascript">
        var ctx = [[@{/}]];
    </script>

    <!-- 导航栏 -->
    <div th:replace="web/fragments/navbar :: navbar"></div>

    <!-- 主要内容 -->
    <div class="history-container">
        <div class="container">
            <div class="history-card">
                <div class="history-header">
                    <h2 class="history-title">我的浏览记录</h2>
                    <a th:href="@{/web/user/profile}" class="back-btn"><i class="fa fa-arrow-left"></i> 返回个人中心</a>
                </div>
                
                <!-- 课程浏览记录 -->
                <div class="course-section">
                    <h3 class="section-title">课程浏览记录</h3>
                    
                    <!-- 课程浏览记录表格 -->
                    <div class="history-table" th:if="${not #lists.isEmpty(courseHistory)}">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th width="25%">课程标题</th>
                                    <th width="40%">课程描述</th>
                                    <th width="15%">浏览时间</th>
                                    <th width="10%">IP地址</th>
                                    <th width="10%">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="view : ${courseHistory}" class="course-row">
                                    <td th:text="${view.title}">课程标题</td>
                                    <td>
                                        <div class="content-summary" th:text="${#strings.abbreviate(view.descriptionSummary, 100)}">课程描述摘要...</div>
                                    </td>
                                    <td th:text="${#dates.format(view.createTime, 'yyyy-MM-dd HH:mm:ss')}">2025-01-01 12:00:00</td>
                                    <td th:text="${view.ipAddr}">127.0.0.1</td>
                                    <td>
                                        <a th:href="@{/web/lesson/{id}(id=${view.targetId})}" class="btn btn-sm btn-primary btn-view btn-view-course">查看</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- 无课程记录提示 -->
                    <div class="empty-history" th:if="${#lists.isEmpty(courseHistory)}">
                        <i class="fa fa-book"></i>
                        <p>暂无课程浏览记录</p>
                    </div>
                    
                    <!-- 课程分页控件 -->
                    <div class="pagination-container" th:if="${not #lists.isEmpty(courseHistory) and courseHistory.size() > 10}">
                        <nav aria-label="课程浏览记录分页">
                            <ul class="pagination" id="coursePagination">
                                <!-- 分页将由JS动态生成 -->
                            </ul>
                        </nav>
                    </div>
                </div>
                
                <!-- 文章浏览记录 -->
                <div class="article-section">
                    <h3 class="section-title">文章浏览记录</h3>
                    
                    <!-- 文章浏览记录表格 -->
                    <div class="history-table" th:if="${not #lists.isEmpty(articleHistory)}">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th width="25%">文章标题</th>
                                    <th width="40%">文章内容</th>
                                    <th width="15%">浏览时间</th>
                                    <th width="10%">IP地址</th>
                                    <th width="10%">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="view : ${articleHistory}" class="article-row">
                                    <td th:text="${view.title}">文章标题</td>
                                    <td>
                                        <div class="content-summary" th:text="${#strings.abbreviate(view.contentSummary, 100)}">文章内容摘要...</div>
                                    </td>
                                    <td th:text="${#dates.format(view.createTime, 'yyyy-MM-dd HH:mm:ss')}">2025-01-01 12:00:00</td>
                                    <td th:text="${view.ipAddr}">127.0.0.1</td>
                                    <td>
                                        <a th:href="@{/web/article/{id}(id=${view.targetId})}" class="btn btn-sm btn-info btn-view btn-view-article">查看</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- 无文章记录提示 -->
                    <div class="empty-history" th:if="${#lists.isEmpty(articleHistory)}">
                        <i class="fa fa-file-text-o"></i>
                        <p>暂无文章浏览记录</p>
                    </div>
                    
                    <!-- 文章分页控件 -->
                    <div class="pagination-container" th:if="${not #lists.isEmpty(articleHistory) and articleHistory.size() > 10}">
                        <nav aria-label="文章浏览记录分页">
                            <ul class="pagination" id="articlePagination">
                                <!-- 分页将由JS动态生成 -->
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer bg-dark text-white py-4">
        <div class="container text-center">
            <p>© 2024 课程学习平台. All rights reserved.</p>
        </div>
    </footer>

    <!-- 初始化脚本 -->
    <script th:inline="javascript">
    /*<![CDATA[*/
    $(function() {
        // 初始化课程分页
        initPagination('course-row', 'coursePagination');
        
        // 初始化文章分页
        initPagination('article-row', 'articlePagination');
    });
    
    // 初始化分页功能
    function initPagination(rowClass, paginationId) {
        var rowsPerPage = 10; // 每页显示10条
        var $rows = $('.' + rowClass);
        var numPages = Math.ceil($rows.length / rowsPerPage);
        
        // 清空分页控件
        var $pagination = $('#' + paginationId);
        $pagination.empty();
        
        // 如果记录少于等于每页显示数量，不显示分页
        if ($rows.length <= rowsPerPage) {
            $pagination.parent().hide();
            return;
        }
        
        // 显示分页容器
        $pagination.parent().show();
        
        // 添加上一页按钮
        $pagination.append(
            $('<li class="page-item disabled">')
                .append($('<a class="page-link" href="#" aria-label="Previous">')
                    .append($('<span aria-hidden="true">').text('«'))
                )
        );
        
        // 添加页码按钮
        for (var i = 1; i <= numPages; i++) {
            var $pageItem = $('<li class="page-item">')
                .append($('<a class="page-link" href="#" data-page="' + i + '" data-type="' + rowClass + '">').text(i));
            
            if (i === 1) {
                $pageItem.addClass('active');
            }
            
            $pagination.append($pageItem);
        }
        
        // 添加下一页按钮
        $pagination.append(
            $('<li class="page-item">')
                .append($('<a class="page-link" href="#" aria-label="Next">')
                    .append($('<span aria-hidden="true">').text('»'))
                )
        );
        
        // 初始显示第一页
        showPage(1, rowClass);
        
        // 页码点击事件
        $('.page-link[data-page][data-type="' + rowClass + '"]').on('click', function(e) {
            e.preventDefault();
            var page = $(this).data('page');
            var type = $(this).data('type');
            showPage(page, type);
        });
        
        // 上一页点击事件
        $pagination.find('.page-link[aria-label="Previous"]').on('click', function(e) {
            e.preventDefault();
            var currentPage = parseInt($pagination.find('.page-item.active .page-link').data('page'));
            if (currentPage > 1) {
                showPage(currentPage - 1, rowClass);
            }
        });
        
        // 下一页点击事件
        $pagination.find('.page-link[aria-label="Next"]').on('click', function(e) {
            e.preventDefault();
            var currentPage = parseInt($pagination.find('.page-item.active .page-link').data('page'));
            if (currentPage < numPages) {
                showPage(currentPage + 1, rowClass);
            }
        });
    }
    
    // 显示指定页码的记录
    function showPage(page, rowClass) {
        var rowsPerPage = 10;
        var $rows = $('.' + rowClass);
        var paginationId = rowClass === 'course-row' ? 'coursePagination' : 'articlePagination';
        var $pagination = $('#' + paginationId);
        
        // 隐藏所有行
        $rows.hide();
        
        // 显示当前页的行
        var startIndex = (page - 1) * rowsPerPage;
        var endIndex = startIndex + rowsPerPage;
        
        $rows.slice(startIndex, endIndex).show();
        
        // 更新分页按钮状态
        $pagination.find('.page-item').removeClass('active');
        $pagination.find('.page-link[data-page="' + page + '"][data-type="' + rowClass + '"]').parent().addClass('active');
        
        // 更新上一页/下一页按钮状态
        if (page === 1) {
            $pagination.find('.page-link[aria-label="Previous"]').parent().addClass('disabled');
        } else {
            $pagination.find('.page-link[aria-label="Previous"]').parent().removeClass('disabled');
        }
        
        var numPages = Math.ceil($rows.length / rowsPerPage);
        if (page === numPages) {
            $pagination.find('.page-link[aria-label="Next"]').parent().addClass('disabled');
        } else {
            $pagination.find('.page-link[aria-label="Next"]').parent().removeClass('disabled');
        }
    }
    /*]]>*/
    </script>
</body>
</html>
