<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏 - 课程学习平台</title>
    <!-- 引入基础样式 -->
    <link href="/css/bootstrap-v4/bootstrap.min.css" rel="stylesheet">
    <link href="/css/font-awesome.min.css" rel="stylesheet">
    <link th:href="@{/css/animate.min.css}" rel="stylesheet"/>
    <link th:href="@{/css/style.min.css}" rel="stylesheet"/>
    <link th:href="@{/ruoyi/css/ry-ui.css}" rel="stylesheet"/>
    <link th:href="@{/css/web-common.css}" rel="stylesheet"/>
    <style>
        /* 复用history.html的样式 */
        body {
            background-color: #f8f9fa;
            font-family: "Microsoft YaHei", sans-serif;
        }
        
        .collection-container {
            padding: 40px 0;
            min-height: calc(100vh - 56px - 116px);
        }
        
        .collection-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 10px rgba(0,0,0,.05);
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .collection-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .collection-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
            margin: 0;
        }
        
        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
            margin: 30px 0 15px 0;
            padding-left: 15px;
            border-left: 4px solid #5b73e8;
        }
        
        .article-section .section-title {
            border-left-color: #4ac1bd;
        }
        
        /* 其他样式与history.html相同 */
        /* ... */
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <div th:replace="web/fragments/navbar :: navbar"></div>

    <!-- 主要内容 -->
    <div class="collection-container">
        <div class="container">
            <div class="collection-card">
                <div class="collection-header">
                    <h2 class="collection-title">我的收藏</h2>
                    <a th:href="@{/web/user/profile}" class="back-btn">
                        <i class="fa fa-arrow-left"></i> 返回个人中心
                    </a>
                </div>
                
                <!-- 课程收藏 -->
                <div class="course-section">
                    <h3 class="section-title">课程收藏</h3>
                    <div class="collection-table" th:if="${not #lists.isEmpty(courseCollections)}">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th width="25%">课程标题</th>
                                    <th width="45%">课程描述</th>
                                    <th width="20%">收藏时间</th>
                                    <th width="10%">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="collection : ${courseCollections}" class="course-row">
                                    <td th:text="${collection.title}">课程标题</td>
                                    <td>
                                        <div class="content-summary" th:text="${#strings.abbreviate(collection.descriptionSummary, 100)}">课程描述摘要...</div>
                                    </td>
                                    <td th:text="${#dates.format(collection.createTime, 'yyyy-MM-dd HH:mm:ss')}">2025-01-01 12:00:00</td>
                                    <td>
                                        <a th:href="@{/web/lesson/{id}(id=${collection.targetId})}" class="btn btn-sm btn-primary btn-view">查看</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="empty-collection" th:if="${#lists.isEmpty(courseCollections)}">
                        <i class="fa fa-book"></i>
                        <p>暂无课程收藏</p>
                    </div>
                </div>
                
                <!-- 文章收藏 -->
                <div class="article-section">
                    <h3 class="section-title">文章收藏</h3>
                    <div class="collection-table" th:if="${not #lists.isEmpty(articleCollections)}">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th width="25%">文章标题</th>
                                    <th width="45%">文章内容</th>
                                    <th width="20%">收藏时间</th>
                                    <th width="10%">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="collection : ${articleCollections}" class="article-row">
                                    <td th:text="${collection.title}">文章标题</td>
                                    <td>
                                        <div class="content-summary" th:text="${#strings.abbreviate(collection.contentSummary, 100)}">文章内容摘要...</div>
                                    </td>
                                    <td th:text="${#dates.format(collection.createTime, 'yyyy-MM-dd HH:mm:ss')}">2025-01-01 12:00:00</td>
                                    <td>
                                        <a th:href="@{/web/article/{id}(id=${collection.targetId})}" class="btn btn-sm btn-info btn-view">查看</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="empty-collection" th:if="${#lists.isEmpty(articleCollections)}">
                        <i class="fa fa-file-text-o"></i>
                        <p>暂无文章收藏</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer bg-dark text-white py-4">
        <div class="container text-center">
            <p>© 2024 课程学习平台. All rights reserved.</p>
        </div>
    </footer>

    <!-- JS引用 -->
    <script th:src="@{/js/jquery.min.js}"></script>
    <script th:src="@{/js/bootstrap.min.js}"></script>
    <script th:src="@{/ajax/libs/layer/layer.min.js}"></script>
    <script th:src="@{/js/common.js}"></script>
</body>
</html>
