<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>登录JY学习系统</title>
    <meta name="description" content="多模态学习系统">
    <link href="../static/css/bootstrap.min.css" th:href="@{/css/bootstrap.min.css}" rel="stylesheet"/>
    <link href="../static/css/font-awesome.min.css" th:href="@{/css/font-awesome.min.css}" rel="stylesheet"/>
    <link href="../static/ruoyi/css/ry-ui.css" th:href="@{/ruoyi/css/ry-ui.css?v=4.7.9}" rel="stylesheet"/>
    <link href="../static/ajax/libs/layer/css/layer.css" th:href="@{/ajax/libs/layer/css/layer.css}" rel="stylesheet"/>
    <!-- 360浏览器急速模式 -->
    <meta name="renderer" content="webkit">
    <!-- 避免IE使用兼容模式 -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="shortcut icon" href="../static/favicon.ico" th:href="@{favicon.ico}"/>
    <style>
        body {
            background: linear-gradient(135deg, rgba(30, 144, 255, 0.7) 0%, rgba(0, 0, 128, 0.7) 100%);
            margin: 0;
            font-family: "Microsoft YaHei", sans-serif;
        }
        .login-container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
        }
        .login-box {
            display: flex;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.2);
            margin: auto;
            width: 1000px;
            overflow: hidden;
        }
        .login-form-side {
            padding: 40px;
            width: 400px;
            background: white;
        }
        .illustration-side {
            flex: 1;
            background: linear-gradient(135deg, rgba(33, 150, 243, 0.70) 0%, rgba(25, 118, 210, 0.70) 100%);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .illustration-side::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url([[${#servletContext.contextPath}]]/img/login-bg.png) no-repeat center center;
            background-size: cover;
            opacity: 0.1;
        }
        .form-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #333;
        }
        .form-control {
            height: 45px;
            border-radius: 6px;
            border: 1px solid #ddd;
            padding: 10px 15px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #2196F3;
            box-shadow: 0 0 0 2px rgba(33, 150, 243, 0.2);
        }
        .btn-login {
            height: 45px;
            border-radius: 6px;
            background: #2196F3;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
            width: 100%;
        }
        .btn-login:hover {
            background: #1976D2;
            transform: translateY(-1px);
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
        }
        .register-link a {
            color: #2196F3;
            text-decoration: none;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
        .illustration-content {
            position: relative;
            z-index: 1;
        }
        .illustration-title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .illustration-text {
            font-size: 16px;
            opacity: 0.9;
            line-height: 1.6;
        }
        .captcha-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .captcha-input {
            flex: 1;
        }
        .captcha-img {
            height: 45px;
            border-radius: 6px;
            cursor: pointer;
        }
        .remember-me {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        .remember-me input[type="checkbox"] {
            margin-right: 8px;
        }
        .remember-me label {
            color: #666;
            font-weight: normal;
            margin: 0;
            cursor: pointer;
        }
        label.error {
            color: #f44336;
            font-size: 12px;
            margin-top: -10px;
            margin-bottom: 10px;
            display: block;
        }
    </style>
    <script>
        if(window.top!==window.self){alert('未登录或登录超时。请重新登录');window.top.location=window.location};
    </script>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-form-side">
                <div class="form-title">登录</div>
                <form id="signupForm" autocomplete="off">
                    <input type="text" name="username" class="form-control uname" placeholder="用户名"/>
                    <input type="password" name="password" class="form-control pword" placeholder="密码"/>
                    <div class="captcha-group" th:if="${captchaEnabled==true}">
                        <input type="text" name="validateCode" class="form-control captcha-input code" placeholder="验证码" maxlength="5">
                        <a href="javascript:void(0);" title="点击更换验证码">
                            <img th:src="@{/captcha/captchaImage(type=${captchaType})}" class="captcha-img imgcode" width="85%"/>
                        </a>
                    </div>
                    <div class="remember-me" th:if="${isRemembered}">
                        <input type="checkbox" id="rememberme" name="rememberme">
                        <label for="rememberme">记住我</label>
                    </div>
                    <button class="btn btn-login" id="btnSubmit" data-loading="正在验证登录，请稍候...">登录</button>
                    <div class="register-link">
                        <a th:href="@{/register}">还没有账号？立即注册</a>
                        <span style="margin: 0 8px; color: #999;">|</span>
                        <a th:href="@{/web/member/renew}">会员续费入口</a>
                    </div>
                </form>
            </div>
            <div class="illustration-side">
                <div class="illustration-content">
                    <div class="illustration-title">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-graduation-cap"><path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"></path><path d="M22 10v6"></path><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"></path></svg>
                        在线学习平台
                    </div>
                    <div class="illustration-text">
                        欢迎使用我们的在线学习平台<br>
                        这里有丰富的课程资源和学习工具<br>
                        让我们一起开启学习之旅
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript"> var ctx = [[@{/}]]; var captchaType = [[${captchaType}]]; var captchaEnabled = [[${captchaEnabled}]];</script>
    <!-- 全局js -->
    <script src="../static/js/jquery.min.js" th:src="@{/js/jquery.min.js}"></script>
    <script src="../static/ajax/libs/validate/jquery.validate.min.js" th:src="@{/ajax/libs/validate/jquery.validate.min.js}"></script>
    <script src="../static/ajax/libs/layer/layer.min.js" th:src="@{/ajax/libs/layer/layer.min.js}"></script>
    <script src="../static/ajax/libs/blockUI/jquery.blockUI.js" th:src="@{/ajax/libs/blockUI/jquery.blockUI.js}"></script>
    <script src="../static/ruoyi/js/ry-ui.js" th:src="@{/ruoyi/js/ry-ui.js?v=4.7.9}"></script>
    <script src="../static/ruoyi/login.js" th:src="@{/ruoyi/login.js}"></script>
</body>
</html>
