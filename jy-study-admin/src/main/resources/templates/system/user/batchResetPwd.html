<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('批量统一改密')" />
    <style>
        .batch-password-panel {
            border: 1px solid #e7eaec;
            border-radius: 8px;
            background: #f8fbff;
            padding: 16px 18px;
            margin-bottom: 18px;
        }
        .batch-password-title {
            font-size: 15px;
            font-weight: 600;
            color: #1f2d3d;
            margin-bottom: 12px;
        }
        .batch-password-tip {
            margin: 0 0 10px;
            color: #5b6573;
            line-height: 1.8;
        }
        .batch-user-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .batch-user-tag {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background: #e8f3ff;
            color: #246bce;
            font-size: 12px;
        }
        .password-action-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-user-batchResetPwd">
        <input type="hidden" name="ids" th:value="${ids}" />
        <input type="hidden" id="initPasswordValue" th:value="${initPassword}" />

        <div class="batch-password-panel">
            <div class="batch-password-title">本次统一改密范围</div>
            <p class="batch-password-tip">
                已选择 <strong th:text="${selectedCount}">0</strong> 个用户，提交后这些用户会统一使用同一个新密码。
            </p>
            <p class="batch-password-tip" th:if="${skippedAdminCount > 0}">
                已自动跳过 <strong th:text="${skippedAdminCount}">0</strong> 个超级管理员账号。
            </p>
            <div class="batch-user-list">
                <span class="batch-user-tag" th:each="item : ${users}" th:text="${item.loginName + ' / ' + item.userName}">air / air</span>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">新密码：</label>
            <div class="col-sm-8">
                <div class="input-group">
                    <input class="form-control" type="password" name="password" id="password" placeholder="请输入统一设置的新密码">
                    <span class="input-group-btn">
                        <button class="btn btn-default" type="button" onclick="togglePasswordInput('password', this)">
                            <i class="fa fa-eye"></i>
                        </button>
                    </span>
                </div>
                <div class="password-action-row">
                    <button type="button" class="btn btn-white btn-sm" onclick="fillInitPassword()">
                        <i class="fa fa-history"></i> 设为初始密码
                    </button>
                    <button type="button" class="btn btn-white btn-sm" onclick="copyPasswordValue('password')">
                        <i class="fa fa-copy"></i> 复制新密码
                    </button>
                </div>
                <th:block th:with="chrtype=${@config.getKey('sys.account.chrtype')}">
                    <th:block th:if="${chrtype != '0'}">
                        <span class="help-block m-b-none">
                            <th:block th:if="${chrtype == '1'}"><i class="fa fa-info-circle" style="color: red;"></i>  密码只能为0-9数字 </th:block>
                            <th:block th:if="${chrtype == '2'}"><i class="fa fa-info-circle" style="color: red;"></i>  密码只能为a-z和A-Z字母</th:block>
                            <th:block th:if="${chrtype == '3'}"><i class="fa fa-info-circle" style="color: red;"></i>  密码必须包含（字母，数字）</th:block>
                            <th:block th:if="${chrtype == '4'}"><i class="fa fa-info-circle" style="color: red;"></i>  密码必须包含（字母，数字，特殊字符!@#$%^&*()-=_+）</th:block>
                        </span>
                    </th:block>
                </th:block>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-3 control-label">确认密码：</label>
            <div class="col-sm-8">
                <div class="input-group">
                    <input class="form-control" type="password" name="confirmPassword" id="confirmPassword" placeholder="请再次输入统一密码">
                    <span class="input-group-btn">
                        <button class="btn btn-default" type="button" onclick="togglePasswordInput('confirmPassword', this)">
                            <i class="fa fa-eye"></i>
                        </button>
                    </span>
                </div>
                <span class="help-block m-b-none"><i class="fa fa-info-circle"></i> 批量修改后将立即覆盖这些用户的旧密码。</span>
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">
    $("#form-user-batchResetPwd").validate({
        rules:{
            password:{
                required: true,
                minlength: 5,
                maxlength: 20,
                specialSign: true
            },
            confirmPassword: {
                required: true,
                equalTo: "#password"
            }
        },
        messages: {
            password: {
                required: "请输入新密码",
                minlength: "密码不能小于5个字符",
                maxlength: "密码不能大于20个字符"
            },
            confirmPassword: {
                required: "请再次输入新密码",
                equalTo: "两次密码输入不一致"
            }
        },
        focusCleanup: true
    });

    function togglePasswordInput(inputId, btn) {
        var $input = $("#" + inputId);
        var isPassword = $input.attr("type") === "password";
        $input.attr("type", isPassword ? "text" : "password");
        $(btn).find("i").attr("class", isPassword ? "fa fa-eye-slash" : "fa fa-eye");
    }

    function fillInitPassword() {
        var initPassword = $("#initPasswordValue").val() || "";
        $("#password").val(initPassword);
        $("#confirmPassword").val(initPassword);
    }

    function copyPasswordValue(inputId) {
        var value = $("#" + inputId).val() || "";
        if (!value) {
            $.modal.msgWarning("当前没有可复制的密码");
            return;
        }
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(value).then(function() {
                $.modal.msgSuccess("密码已复制");
            }, function() {
                fallbackCopy(value);
            });
        } else {
            fallbackCopy(value);
        }
    }

    function fallbackCopy(value) {
        var $temp = $("<input>");
        $("body").append($temp);
        $temp.val(value).select();
        document.execCommand("copy");
        $temp.remove();
        $.modal.msgSuccess("密码已复制");
    }

    function submitHandler() {
        var chrtype = [[${#strings.defaultString(@config.getKey('sys.account.chrtype'), 0)}]];
        var password = $("#password").val();
        if ($.validate.form() && checkpwd(chrtype, password)) {
            $.operate.save(ctx + "system/user/batchResetPwd", $('#form-user-batchResetPwd').serialize());
        }
    }
</script>
</body>
</html>
