<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('会员管理')" />
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="formId">
                <div class="select-list">
                    <ul>
                        <li>
                            登录名称：<input type="text" name="loginName"/>
                        </li>
                        <li>
                            手机号码：<input type="text" name="phonenumber"/>
                        </li>
                        <li>
                            账号状态：<select name="status" th:with="type=${@dict.getType('sys_normal_disable')}">
                                <option value="">所有</option>
                                <option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"></option>
                            </select>
                        </li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>

        <div class="btn-group-sm" id="toolbar" role="group">
            <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="system:member:edit">
                <i class="fa fa-edit"></i> 修改会员
            </a>
        </div>

        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">
    var editFlag = [[${@permission.hasPermi('system:member:edit')}]];
    var statusDatas = [[${@dict.getType('sys_normal_disable')}]];
    var prefix = ctx + "system/member";

    $(function() {
        var options = {
            url: prefix + "/list",
            updateUrl: prefix + "/edit/{id}",
            modalName: "会员",
            columns: [{
                checkbox: true
            },
            {
                field: 'userId',
                title: '用户ID'
            },
            {
                field: 'loginName',
                title: '登录账号'
            },
            {
                field: 'userName',
                title: '用户昵称'
            },
            {
                field: 'phonenumber',
                title: '手机号'
            },
            {
                field: 'vipExpireTime',
                title: '会员到期时间',
                sortable: true
            },
            {
                title: '会员状态',
                align: 'center',
                formatter: function(value, row, index) {
                    if (!row.vipExpireTime) {
                        return '<span class="label label-default">未开通</span>';
                    }
                    var expire = new Date(row.vipExpireTime.replace(/-/g, "/"));
                    if (expire.getTime() > new Date().getTime()) {
                        return '<span class="label label-success">有效</span>';
                    }
                    return '<span class="label label-danger">已过期</span>';
                }
            },
            {
                field: 'status',
                title: '账号状态',
                align: 'center',
                formatter: function(value, row, index) {
                    return $.table.selectDictLabel(statusDatas, value);
                }
            },
            {
                field: 'createTime',
                title: '注册时间',
                sortable: true
            },
            {
                title: '操作',
                align: 'center',
                formatter: function(value, row, index) {
                    var actions = [];
                    actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.userId + '\')"><i class="fa fa-edit"></i>编辑</a>');
                    return actions.join('');
                }
            }]
        };
        $.table.init(options);
    });
</script>
</body>
</html>
