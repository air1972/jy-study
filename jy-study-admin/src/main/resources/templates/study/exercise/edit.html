<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('修改题目')" />
</head>
<body>
    <div class="form-content">
        <form id="form-exercise-edit" class="form-horizontal">
            <input name="id" th:field="${studyExercise.id}" type="hidden">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">知识点ID：</label>
                <div class="col-sm-8">
                    <input name="knowledgePointId" th:field="${studyExercise.knowledgePointId}" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">题目类型：</label>
                <div class="col-sm-8">
                    <select name="type" th:field="${studyExercise.type}" class="form-control" required>
                        <option value="1">选择题</option>
                        <option value="2">填空题</option>
                        <option value="3">判断题</option>
                        <option value="4">简答题</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">题目内容：</label>
                <div class="col-sm-8">
                    <textarea name="content" class="form-control" required>[[${studyExercise.content}]]</textarea>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">选项：</label>
                <div class="col-sm-8">
                    <textarea name="options" class="form-control" placeholder="JSON格式">[[${studyExercise.options}]]</textarea>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">正确答案：</label>
                <div class="col-sm-8">
                    <textarea name="answer" class="form-control" required>[[${studyExercise.answer}]]</textarea>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">答案解析：</label>
                <div class="col-sm-8">
                    <textarea name="explanation" class="form-control">[[${studyExercise.explanation}]]</textarea>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script type="text/javascript">
        var prefix = ctx + "study/exercise";
        $("#form-exercise-edit").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/edit", $('#form-exercise-edit').serialize());
            }
        }
    </script>
</body>
</html>
