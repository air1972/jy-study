<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('修改课程')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-lesson-edit" th:object="${studyLesson}">
            <input name="lessonId" th:field="*{lessonId}" type="hidden">
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label is-required">课程标题：</label>
                    <div class="col-sm-8">
                        <input name="title" th:field="*{title}" class="form-control" type="text" required>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label">课程封面图片：</label>
                    <div class="col-sm-8">
                        <input name="coverImg" th:field="*{coverImg}" class="form-control" type="hidden">
                        <div class="image-upload">
                            <img id="previewImage" th:src="*{coverImg}" style="max-width: 200px; max-height: 200px;" th:style="*{coverImg != null && coverImg != ''} ? 'max-width: 200px; max-height: 200px;' : 'display: none;'">
                            <input type="file" name="file" id="imageInput" accept="image/*" style="display: none;">
                            <a class="btn btn-success btn-xs" onclick="$('#imageInput').click()"><i class="fa fa-upload"></i> 上传图片</a>
                            <a class="btn btn-primary btn-xs" onclick="generateAIImage()"><i class="fa fa-magic"></i> AI生成图片</a>
                            <a class="btn btn-danger btn-xs" onclick="clearImage()" th:style="*{coverImg != null && coverImg != ''} ? '' : 'display: none;'" id="clearBtn"><i class="fa fa-trash"></i> 清除图片</a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label">课程描述：</label>
                    <div class="col-sm-8">
                        <textarea name="description" class="form-control">[[*{description}]]</textarea>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label">课程分类：</label>
                    <div class="col-sm-8">

                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label">版本：</label>
                    <div class="col-sm-8">
                        <input name="versionId" type="hidden" th:field="*{versionId}">
                        <input name="versionName" class="form-control" type="hidden" th:field="*{versionName}" readonly>
                        <div class="input-group">
                            <select id="versionSelect" class="form-control">
                                <option value="">请选择版本</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label">科目：</label>
                    <div class="col-sm-8">
                        <input name="subjectId" type="hidden" th:field="*{subjectId}">
                        <input name="subjectName" class="form-control" type="hidden" th:field="*{subjectName}" readonly>
                        <div class="input-group">
                            <select id="subjectSelect" class="form-control">
                                <option value="">请选择科目</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label">年级：</label>
                    <div class="col-sm-8">
                        <input name="gradeId" type="hidden" th:field="*{gradeId}">
                        <input name="gradeName" class="form-control" type="hidden" th:field="*{gradeName}" readonly>
                        <div class="input-group">
                            <select id="gradeSelect" class="form-control">
                                <option value="">请选择年级</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label">册子：</label>
                    <div class="col-sm-8">
                        <input name="volumeId" type="hidden" th:field="*{volumeId}">
                        <input name="volumeName" class="form-control" type="hidden" th:field="*{volumeName}" readonly>
                        <div class="input-group">
                            <select id="volumeSelect" class="form-control">
                                <option value="">请选择册子</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label">课程标签(逗号分隔)：</label>
                    <div class="col-sm-8">
                        <input name="tags" th:field="*{tags}" class="form-control" type="text">
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label">排序：</label>
                    <div class="col-sm-8">
                        <input name="sort" th:field="*{sort}" class="form-control" type="text">
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label">备注：</label>
                    <div class="col-sm-8">
                        <textarea name="remark" class="form-control">[[*{remark}]]</textarea>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label">课程视频：</label>
                    <div class="col-sm-8">
                        <input name="videoUrl" th:field="*{videoUrl}" class="form-control" type="hidden">
                        <div class="video-upload">
                            <video id="previewVideo" th:src="*{videoUrl}" style="max-width: 400px;" th:style="*{videoUrl != null && videoUrl != ''} ? 'max-width: 400px;' : 'display: none;'" controls></video>
                            <input type="file" name="videoFile" id="videoInput" accept="video/*" style="display: none;">
                            <a class="btn btn-success btn-xs" onclick="$('#videoInput').click()"><i class="fa fa-upload"></i> 上传视频</a>
                            <a class="btn btn-danger btn-xs" onclick="clearVideo()" th:style="*{videoUrl != null && videoUrl != ''} ? '' : 'display: none;'" id="clearVideoBtn"><i class="fa fa-trash"></i> 清除视频</a>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var ctx = /*[[@{/}]]*/'';
        var prefix = ctx + "lesson";
        
        $(function() {
            $("#form-lesson-edit").validate({
                focusCleanup: true
            });

            // 图片上传处理
            $("#imageInput").change(function() {
                var file = this.files[0];
                if (!file) return;
                
                var formData = new FormData();
                formData.append("file", file);
                
                $.ajax({
                    url: "/common/upload/image/lesson",
                    type: 'POST',
                    data: formData,
                    processData: false,
                    contentType: false,
                    success: function(response) {
                        if (response.code == 0) {
                            $ ("#previewImage").attr("src", response.data).show();
                            $ ("input[name='coverImg']").val(response.data);
                            $ ("#clearBtn").show();
                            $.modal.msgSuccess("上传成功");
                        } else {
                            $.modal.msgError(response.msg);
                        }
                    }
                });
            });

            // 视频上传处理
            $("#videoInput").change(function() {
                var file = this.files[0];
                if (!file) return;
                
                var formData = new FormData();
                formData.append("file", file);
                
                $.ajax({
                    url: "/common/upload/video/lesson",
                    type: 'POST',
                    data: formData,
                    processData: false,
                    contentType: false,
                    success: function(response) {
                        if (response.code == 0) {
                            $ ("#previewVideo").attr("src", response.data).show();
                            $ ("input[name='videoUrl']").val(response.data);
                            $ ("#clearVideoBtn").show();
                            $.modal.msgSuccess("上传成功");
                        } else {
                            $.modal.msgError(response.msg);
                        }
                    }
                });
            });



            // 加载分类数据
            loadClassifications();
        });

        // 加载分类数据
        function loadClassifications() {
            $.ajax({
                url: ctx + "study/classification/all",
                type: "get",
                dataType: "json",
                success: function(res) {
                    if (res.code == 0) {
                        // 加载版本
                        if (res.versions && res.versions.length > 0) {
                            var versionHtml = '<option value="">请选择版本</option>';
                            var currentVersionId = $ ("input[name='versionId']").val();
                            $.each(res.versions, function(i, item) {
                                if (item.status == '0') {
                                    var selected = item.versionId == currentVersionId ? 'selected' : '';
                                    versionHtml += '<option value="' + item.versionId + '" data-name="' + item.name + '" ' + selected + '>' + item.name + '</option>';
                                }
                            });
                            $ ("#versionSelect").html(versionHtml);
                        }

                        // 加载科目
                        if (res.subjects && res.subjects.length > 0) {
                            var subjectHtml = '<option value="">请选择科目</option>';
                            var currentSubjectId = $ ("input[name='subjectId']").val();
                            $.each(res.subjects, function(i, item) {
                                if (item.status == '0') {
                                    var selected = item.subjectId == currentSubjectId ? 'selected' : '';
                                    subjectHtml += '<option value="' + item.subjectId + '" data-name="' + item.name + '" ' + selected + '>' + item.name + '</option>';
                                }
                            });
                            $ ("#subjectSelect").html(subjectHtml);
                        }

                        // 加载年级
                        if (res.grades && res.grades.length > 0) {
                            var gradeHtml = '<option value="">请选择年级</option>';
                            var currentGradeId = $ ("input[name='gradeId']").val();
                            $.each(res.grades, function(i, item) {
                                if (item.status == '0') {
                                    var selected = item.gradeId == currentGradeId ? 'selected' : '';
                                    gradeHtml += '<option value="' + item.gradeId + '" data-name="' + item.name + '" ' + selected + '>' + item.name + '</option>';
                                }
                            });
                            $ ("#gradeSelect").html(gradeHtml);
                        }

                        // 加载册子
                        if (res.volumes && res.volumes.length > 0) {
                            var volumeHtml = '<option value="">请选择册子</option>';
                            var currentVolumeId = $ ("input[name='volumeId']").val();
                            $.each(res.volumes, function(i, item) {
                                if (item.status == '0') {
                                    var selected = item.volumeId == currentVolumeId ? 'selected' : '';
                                    volumeHtml += '<option value="' + item.volumeId + '" data-name="' + item.name + '" ' + selected + '>' + item.name + '</option>';
                                }
                            });
                            $ ("#volumeSelect").html(volumeHtml);
                        }

                        // 版本选择事件
                        $("#versionSelect").change(function() {
                            var $selected = $(this).find("option:selected");
                            $("input[name='versionId']").val($selected.val());
                            $("input[name='versionName']").val($selected.data("name"));
                        });

                        // 科目选择事件
                        $("#subjectSelect").change(function() {
                            var $selected = $(this).find("option:selected");
                            $("input[name='subjectId']").val($selected.val());
                            $("input[name='subjectName']").val($selected.data("name"));
                        });

                        // 年级选择事件
                        $("#gradeSelect").change(function() {
                            var $selected = $(this).find("option:selected");
                            $("input[name='gradeId']").val($selected.val());
                            $("input[name='gradeName']").val($selected.data("name"));
                        });

                        // 册子选择事件
                        $("#volumeSelect").change(function() {
                            var $selected = $(this).find("option:selected");
                            $("input[name='volumeId']").val($selected.val());
                            $("input[name='volumeName']").val($selected.data("name"));
                        });
                    }
                }
            });
        }

        function clearImage() {
            $("#previewImage").attr("src", "").hide();
            $("input[name='coverImg']").val("");
            $("#imageInput").val("");
            $("#clearBtn").hide();
        }

        function clearVideo() {
            $("#previewVideo").attr("src", "").hide();
            $("input[name='videoUrl']").val("");
            $("#videoInput").val("");
            $("#clearVideoBtn").hide();
        }

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save("/lesson/edit", $('#form-lesson-edit').serialize());
            }
        }

        function generateAIImage() {
            var title = $ ("input[name='title']").val();
            if (!title) {
                $.modal.msgError("请先输入课程标题");
                return;
            }
            
            $.modal.loading("正在生成图片，请稍候...");
            $.ajax({
                url: "/ttl/generate/image/lesson",
                type: "POST",
                data: {
                    title: title
                },
                success: function(response) {
                    if (response.code == 0 && response.data) {
                        $ ("#previewImage").attr("src", response.data).show();
                        $ ("input[name='coverImg']").val(response.data);
                        $ ("#clearBtn").show();
                        $.modal.msgSuccess("图片生成成功");
                    } else {
                        $.modal.msgError(response.msg || "图片生成失败");
                    }
                },
                error: function() {
                    $.modal.msgError("图片生成请求失败");
                },
                complete: function() {
                    $.modal.closeLoading();
                }
            });
        }
    </script>
</body>
</html>
