<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('AI生成练习')" />
    <th:block th:include="include :: select2-css" />
    <style>
        .form-group {
            margin-bottom: 15px;
        }
        .number-input {
            width: 80px;
            display: inline-block;
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .loading-content {
            background: white;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
        }
        .loading-spinner {
            font-size: 30px;
            color: #2196F3;
            margin-bottom: 15px;
        }
    </style>
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-ai-generate">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">选择课程：</label>
                <div class="col-sm-8">
                    <select name="lessonId" class="form-control" id="lessonSelect" required>
                        <option value="">请选择课程</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">知识点/主题：</label>
                <div class="col-sm-8">
                    <textarea name="topic" class="form-control" rows="3" placeholder="请输入知识点或主题描述，AI将根据此内容生成练习题目"></textarea>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">题目数量：</label>
                <div class="col-sm-8">
                    <div class="input-group">
                        <span class="input-group-addon">单选题</span>
                        <input type="number" name="xuanze" class="form-control number-input" value="3" min="0" max="10">
                    </div>
                    <div class="input-group" style="margin-top: 10px;">
                        <span class="input-group-addon">多选题</span>
                        <input type="number" name="duoxuan" class="form-control number-input" value="2" min="0" max="10">
                    </div>
                    <div class="input-group" style="margin-top: 10px;">
                        <span class="input-group-addon">判断题</span>
                        <input type="number" name="panduan" class="form-control number-input" value="2" min="0" max="10">
                    </div>
                    <div class="input-group" style="margin-top: 10px;">
                        <span class="input-group-addon">简答题</span>
                        <input type="number" name="jianda" class="form-control number-input" value="1" min="0" max="5">
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">难度设置：</label>
                <div class="col-sm-8">
                    <select name="difficulty" class="form-control">
                        <option value="1">简单</option>
                        <option value="2" selected>中等</option>
                        <option value="3">困难</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">每题分值：</label>
                <div class="col-sm-8">
                    <input type="number" name="score" class="form-control" value="10" min="1" max="100">
                </div>
            </div>
        </form>
    </div>
    
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="loading-spinner">
                <i class="fa fa-spinner fa-spin"></i>
            </div>
            <h4>AI正在生成练习...</h4>
            <p>请稍候，这可能需要几秒钟时间</p>
        </div>
    </div>

    <th:block th:include="include :: footer" />
    <th:block th:include="include :: select2-js" />
    <script th:inline="javascript">
        var ctx = /*[[@{/}]]*/'';
        var prefix = ctx + "lesson/exercise";

        // 加载课程列表
        function loadLessonList() {
            $.ajax({
                url: ctx + 'lesson/listAll',
                type: 'get',
                dataType: 'json',
                success: function(res) {
                    if (res.code === 0) {
                        var html = '<option value="">请选择课程</option>';
                        res.rows.forEach(function(lesson) {
                            html += '<option value="' + lesson.lessonId + '">' + lesson.title + '</option>';
                        });
                        $('#lessonSelect').html(html);
                        $('#lessonSelect').select2({
                            placeholder: '请选择课程',
                            allowClear: true
                        });
                        
                        // 从父页面获取选中的课程ID
                        var parentLessonId = parent.$('#lessonSelect').val();
                        if (parentLessonId) {
                            $('#lessonSelect').val(parentLessonId).trigger('change');
                        }
                    }
                }
            });
        }

        function submitHandler() {
            if ($.validate.form()) {
                var data = $('#form-ai-generate').serialize();
                
                // 显示加载动画
                $('#loadingOverlay').css('display', 'flex');
                
                $.ajax({
                    url: prefix + "/aiGenerate",
                    type: "post",
                    data: data,
                    success: function(result) {
                        // 隐藏加载动画
                        $('#loadingOverlay').hide();
                        
                        if (result.code == 0) {
                            layer.msg("AI生成成功，已创建 " + result.data + " 道题目", {icon: 1});
                            // 刷新父页面表格
                            parent.$.table.refresh();
                            // 关闭弹窗
                            var index = parent.layer.getFrameIndex(window.name);
                            parent.layer.close(index);
                        } else {
                            layer.msg(result.msg, {icon: 2});
                        }
                    },
                    error: function() {
                        $('#loadingOverlay').hide();
                        layer.msg("生成失败，请稍后重试", {icon: 2});
                    }
                });
            }
        }

        $(function() {
            loadLessonList();
        });
    </script>
</body>
</html>
