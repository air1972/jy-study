<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('课程练习列表')" />
    <th:block th:include="include :: select2-css" />
    <style>
        .select2-container .select2-selection--single {
            height: 34px;
        }
    </style>
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <label>课程：</label>
                                <select name="lessonId" class="form-control" id="lessonSelect">
                                    <option value="">全部课程</option>
                                </select>
                            </li>
                            <li>
                                <label>练习标题：</label>
                                <input type="text" name="title"/>
                            </li>
                            <li>
                                <label>题目类型：</label>
                                <select name="exerciseType" class="form-control">
                                    <option value="">全部</option>
                                    <option value="1">单选题</option>
                                    <option value="2">多选题</option>
                                    <option value="3">判断题</option>
                                    <option value="4">简答题</option>
                                </select>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="resetQuery()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()">
                    <i class="fa fa-plus"></i> 添加
                </a>
                <a class="btn btn-info" onclick="aiGenerate()">
                    <i class="fa fa-magic"></i> AI生成
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()">
                    <i class="fa fa-remove"></i> 删除
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <th:block th:include="include :: select2-js" />
    <script th:inline="javascript">
        var ctx = /*[[@{/}]]*/'';
        var prefix = ctx + "lesson/exercise";

        // 加载课程列表
        function loadLessonList() {
            $.ajax({
                url: ctx + 'lesson/listAll',
                type: 'get',
                dataType: 'json',
                success: function(res) {
                    if (res.code === 0) {
                        var html = '<option value="">全部课程</option>';
                        res.rows.forEach(function(lesson) {
                            html += '<option value="' + lesson.lessonId + '">' + lesson.title + '</option>';
                        });
                        $('#lessonSelect').html(html);
                        // 重新初始化 select2
                        $('#lessonSelect').select2({
                            placeholder: '请选择课程',
                            allowClear: true
                        });
                        $('#lessonSelect').on('change', function() {
                            $.table.search();
                        });
                    }
                }
            });
        }

        function resetQuery() {
            $.form.reset();
            $('#lessonSelect').val('').trigger('change');
            $.table.search();
        }

        // AI生成练习
        function aiGenerate() {
            var url = prefix + '/aiGenerate';
            $.modal.open("AI生成练习", url);
        }

        $(function() {
            loadLessonList();
            
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                modalName: "练习",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'exerciseId',
                    title: '练习 ID',
                    visible: false
                },
                {
                    field: 'lessonId',
                    title: '课程 ID',
                    visible: false
                },
                {
                    field: 'lessonTitle',
                    title: '所属课程',
                    formatter: function(value) {
                        return value ? value : '-';
                    }
                },
                {
                    field: 'title',
                    title: '练习标题'
                },
                {
                    field: 'exerciseType',
                    title: '题目类型',
                    formatter: function(value) {
                        switch(value) {
                            case '1': return '<span class="badge badge-info">单选题</span>';
                            case '2': return '<span class="badge badge-warning">多选题</span>';
                            case '3': return '<span class="badge badge-success">判断题</span>';
                            case '4': return '<span class="badge badge-secondary">简答题</span>';
                            default: return value;
                        }
                    }
                },
                {
                    field: 'answer',
                    title: '正确答案'
                },
                {
                    field: 'score',
                    title: '分值'
                },
                {
                    field: 'difficulty',
                    title: '难度',
                    formatter: function(value) {
                        switch(value) {
                            case '1': return '<span class="badge badge-success">简单</span>';
                            case '2': return '<span class="badge badge-warning">中等</span>';
                            case '3': return '<span class="badge badge-danger">困难</span>';
                            default: return value;
                        }
                    }
                },
                {
                    field: 'sort',
                    title: '排序'
                },
                {
                    field: 'status',
                    title: '状态',
                    formatter: function(value) {
                        return value === '0' ?
                            '<span class="badge badge-success">正常</span>' :
                            '<span class="badge badge-danger">停用</span>';
                    }
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.exerciseId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.exerciseId + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>
