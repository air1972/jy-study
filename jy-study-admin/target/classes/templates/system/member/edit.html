<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('编辑会员')" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <div class="alert alert-danger" th:if="${errorMsg != null and errorMsg != ''}" th:text="${errorMsg}"></div>
    <form class="form-horizontal m" id="form-member-edit" th:object="${user}" th:if="${errorMsg == null or errorMsg == ''}">
        <input type="hidden" name="userId" th:field="*{userId}"/>
        <div class="form-group">
            <label class="col-sm-3 control-label">登录账号：</label>
            <div class="col-sm-8">
                <input class="form-control" th:value="*{loginName}" type="text" readonly>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">用户昵称：</label>
            <div class="col-sm-8">
                <input class="form-control" th:value="*{userName}" type="text" readonly>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">会员到期时间：</label>
            <div class="col-sm-8">
                <input id="vipExpireTime" name="vipExpireTime" class="form-control" type="text"
                       th:value="${user.vipExpireTime != null ? #dates.format(user.vipExpireTime, 'yyyy-MM-dd HH:mm:ss') : ''}"
                       placeholder="格式：yyyy-MM-dd HH:mm:ss" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">账号状态：</label>
            <div class="col-sm-8">
                <label class="toggle-switch switch-solid">
                    <input type="checkbox" id="status" th:checked="${user.status == '0'}">
                    <span></span>
                </label>
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<script>
    var prefix = ctx + "system/member";

    $("#form-member-edit").validate({
        focusCleanup: true
    });

    function submitHandler() {
        if (!$.validate.form()) {
            return;
        }
        var data = $("#form-member-edit").serializeArray();
        data.push({name: "status", value: $("#status").is(":checked") ? "0" : "1"});
        $.operate.save(prefix + "/edit", $.param(data));
    }
</script>
</body>
</html>
