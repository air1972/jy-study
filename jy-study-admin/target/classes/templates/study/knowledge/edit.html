<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('修改知识点')" />
</head>
<body>
    <div class="form-content">
        <form id="form-knowledge-edit" class="form-horizontal">
            <input name="id" th:field="${studyKnowledgePoint.id}" type="hidden">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">知识点名称：</label>
                <div class="col-sm-8">
                    <input name="name" th:field="${studyKnowledgePoint.name}" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">知识点描述：</label>
                <div class="col-sm-8">
                    <textarea name="description" class="form-control" rows="10">[[${studyKnowledgePoint.description}]]</textarea>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script type="text/javascript">
        var prefix = ctx + "study/knowledge";
        $("#form-knowledge-edit").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/edit", $('#form-knowledge-edit').serialize());
            }
        }
    </script>
</body>
</html>
