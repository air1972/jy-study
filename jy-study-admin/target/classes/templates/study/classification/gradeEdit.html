<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('修改年级')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-grade-edit" th:object="${studyGrade}">
            <input name="gradeId" th:field="*{gradeId}" type="hidden"/>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">年级名称：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" name="name" id="name" th:field="*{name}" required/>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">年级编码：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" name="code" id="code" th:field="*{code}" required/>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">显示顺序：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="number" name="sort" id="sort" th:field="*{sort}"/>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">状态：</label>
                <div class="col-sm-8">
                    <div class="radio-box">
                        <input type="radio" id="status0" name="status" value="0" th:field="*{status}"/>
                        <label for="status0">正常</label>
                    </div>
                    <div class="radio-box">
                        <input type="radio" id="status1" name="status" value="1" th:field="*{status}"/>
                        <label for="status1">停用</label>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">备注：</label>
                <div class="col-sm-8">
                    <textarea class="form-control" name="remark" id="remark" th:field="*{remark}" rows="3"></textarea>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var prefix = ctx + "study/classification/grade";

        $("#form-grade-edit").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/edit", $("#form-grade-edit").serialize());
            }
        }
    </script>
</body>
</html>
