<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <meta charset="UTF-8">
    <title>Navbar Fragment</title>
    <style>
        /* 导航栏基础样式 */
        .navbar {
            box-shadow: 0 2px 4px rgba(0,0,0,.08);
        }

        /* 用户下拉菜单样式 */
        .user-dropdown {
            position: relative;
            display: inline-block;
        }

        .user-dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: #fff;
            min-width: 160px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            border-radius: 4px;
            z-index: 1000;
        }

        .user-dropdown:hover .user-dropdown-content {
            display: block;
        }

        .user-dropdown-item {
            display: block;
            padding: 12px 16px;
            color: #333;
            text-decoration: none;
            transition: all 0.2s;
        }

        .user-dropdown-item:hover {
            background-color: #f8f9fa;
            color: #2196F3;
        }

        .user-dropdown-item i {
            margin-right: 8px;
            width: 16px;
            text-align: center;
        }

        /* 响应式样式 */
        @media (max-width: 991.98px) {
            .user-dropdown-content {
                position: static;
                box-shadow: none;
                background: transparent;
            }
            
            .user-dropdown-item {
                color: rgba(255,255,255,0.9);
                padding: 8px 16px;
            }
            
            .user-dropdown-item:hover {
                background-color: rgba(255,255,255,0.1);
                color: #fff;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏片段 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary" th:fragment="navbar">
        <div class="container">
            <div style="display: flex; align-items: center;">
                <a class="navbar-brand" th:href="@{/web}" style="margin-right: 15px;">课程学习平台</a>
            </div>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item active">
                        <a class="nav-link" th:href="@{/web}"><i class="fa fa-home"></i> 首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/web/category/lesson}"><i class="fa fa-th-list"></i> 课程分类</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/web/category/article}"><i class="fa fa-file-text"></i> 文章分类</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/web/exercise}"><i class="fa fa-pencil-square-o"></i> 习题库</a>
                    </li>
                    <li class="nav-item" shiro:hasRole="admin">
                        <a class="nav-link" th:href="@{/index}">
                            <i class="fa fa-cogs"></i> 后台管理
                        </a>
                    </li>
                    <th:block shiro:guest="">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/login}">
                                <i class="fa fa-sign-in"></i> 登录
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/register}">
                                <i class="fa fa-user-plus"></i> 注册
                            </a>
                        </li>
                    </th:block>
                    <th:block shiro:authenticated="">
                        <li class="nav-item user-dropdown">
                            <a class="nav-link" href="#">
                                <i class="fa fa-user-circle"></i>
                                <span th:text="${@shiroService.getPrincipal().userName}">用户</span>
                            </a>
                            <div class="user-dropdown-content" style="margin-top: -8px">
                                <a class="user-dropdown-item" th:href="@{/web/user/profile}">
                                    <i class="fa fa-user"></i> 个人中心
                                </a>
                                <a class="user-dropdown-item" th:href="@{/web/member}">
                                    <i class="fa fa-diamond"></i> 会员中心
                                </a>
                                <a class="user-dropdown-item" th:href="@{/logout}">
                                    <i class="fa fa-sign-out"></i> 退出登录
                                </a>
                            </div>
                        </li>
                    </th:block>
                </ul>
            </div>
        </div>
    </nav>
</body>
</html>
