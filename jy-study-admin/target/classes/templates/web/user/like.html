<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的点赞 - 课程学习平台</title>
    <!-- 引入基础样式 -->
    <link href="/css/bootstrap-v4/bootstrap.min.css" rel="stylesheet">
    <link href="/css/font-awesome.min.css" rel="stylesheet">
    <link th:href="@{/css/animate.min.css}" rel="stylesheet"/>
    <link th:href="@{/css/style.min.css}" rel="stylesheet"/>
    <link th:href="@{/ruoyi/css/ry-ui.css}" rel="stylesheet"/>
    <link th:href="@{/css/web-common.css}" rel="stylesheet"/>
    <style>
        body {
            background-color: #f8f9fa;
            font-family: "Microsoft YaHei", sans-serif;
        }
        
        .like-container {
            padding: 40px 0;
            min-height: calc(100vh - 56px - 116px);
        }
        
        .like-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 10px rgba(0,0,0,.05);
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .like-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .like-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
            margin: 0;
        }
        
        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
            margin: 30px 0 15px 0;
            padding-left: 15px;
            border-left: 4px solid #5b73e8;
        }
        
        .article-section .section-title {
            border-left-color: #4ac1bd;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <div th:replace="web/fragments/navbar :: navbar"></div>

    <div class="like-container">
        <div class="container">
            <div class="like-card">
                <div class="like-header">
                    <h2 class="like-title">我的点赞</h2>
                </div>
                
                <!-- 课程点赞 -->
                <div class="course-section">
                    <h3 class="section-title">课程点赞</h3>
                    <div class="like-table" th:if="${not #lists.isEmpty(courseLikes)}">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th width="25%">课程标题</th>
                                    <th width="45%">课程描述</th>
                                    <th width="20%">点赞时间</th>
                                    <th width="10%">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="like : ${courseLikes}" class="course-row">
                                    <td th:text="${like.title}">课程标题</td>
                                    <td>
                                        <div class="content-summary" th:text="${#strings.abbreviate(like.descriptionSummary, 100)}">课程描述摘要...</div>
                                    </td>
                                    <td th:text="${#dates.format(like.createTime, 'yyyy-MM-dd HH:mm:ss')}">2025-01-01 12:00:00</td>
                                    <td>
                                        <a th:href="@{/web/lesson/{id}(id=${like.targetId})}" class="btn btn-sm btn-primary btn-view">查看</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="empty-like" th:if="${#lists.isEmpty(courseLikes)}">
                        <i class="fa fa-book"></i>
                        <p>暂无课程点赞</p>
                    </div>
                </div>
                
                <!-- 文章点赞 -->
                <div class="article-section">
                    <h3 class="section-title">文章点赞</h3>
                    <div class="like-table" th:if="${not #lists.isEmpty(articleLikes)}">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th width="25%">文章标题</th>
                                    <th width="45%">文章内容</th>
                                    <th width="20%">点赞时间</th>
                                    <th width="10%">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="like : ${articleLikes}" class="article-row">
                                    <td th:text="${like.title}">文章标题</td>
                                    <td>
                                        <div class="content-summary" th:text="${#strings.abbreviate(like.contentSummary, 100)}">文章内容摘要...</div>
                                    </td>
                                    <td th:text="${#dates.format(like.createTime, 'yyyy-MM-dd HH:mm:ss')}">2025-01-01 12:00:00</td>
                                    <td>
                                        <a th:href="@{/web/article/{id}(id=${like.targetId})}" class="btn btn-sm btn-info btn-view">查看</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="empty-like" th:if="${#lists.isEmpty(articleLikes)}">
                        <i class="fa fa-file-text-o"></i>
                        <p>暂无文章点赞</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer bg-dark text-white py-4">
        <div class="container text-center">
            <p>© 2024 课程学习平台. All rights reserved.</p>
        </div>
    </footer>

    <!-- JS引用 -->
    <script th:src="@{/js/jquery.min.js}"></script>
    <script th:src="@{/js/bootstrap.min.js}"></script>
    <script th:src="@{/ajax/libs/layer/layer.min.js}"></script>
    <script th:src="@{/js/common.js}"></script>
</body>
</html>
