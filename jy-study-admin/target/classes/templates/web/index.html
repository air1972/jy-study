<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程学习平台</title>
    <link href="/css/bootstrap-v4/bootstrap.min.css" rel="stylesheet">
    <link href="/css/font-awesome.min.css" rel="stylesheet">
    <link href="/css/web-common.css" rel="stylesheet"/>
    <link href="/css/web-index.css" rel="stylesheet"/>
    <link rel="stylesheet" crossorigin href="https://g.alicdn.com/aliyun-documentation/web-chatbot-ui/0.0.24/index.css" />
    <style>
        .navbar {
            box-shadow: 0 2px 4px rgba(0,0,0,.08);
        }
        .jumbotron {
            background: linear-gradient(135deg, #0396FF 0%, #ABDCFF 100%);
            background-image: url('data:image/svg+xml,%3Csvg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"%3E%3Cpath d="M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z" fill="rgba(255,255,255,.1)" fill-rule="evenodd"/%3E%3C/svg%3E'),
            linear-gradient(135deg, #0396FF 0%, #ABDCFF 100%);
            color: white;
            padding: 100px 0;
            margin-bottom: 0;
        }
        .article-card {
            height: 250px; /* 统一文章卡片高度 */
            display: flex;
            flex-direction: column;
        }
        .article-card .card-body {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .article-card .btn-read {
            margin-top: auto; /* 按钮固定在底部 */
        }
        .article-card {
            border: none;
            transition: transform .2s;
            margin-bottom: 30px;
            box-shadow: 0 2px 10px rgba(0,0,0,.05);
        }
        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0,0,0,.1);
        }
        .card-body {
            padding: 25px;
        }
        .article-meta {
            color: #6c757d;
            font-size: 0.9rem;
        }
        .article-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 10px 0;
            color: #343a40;
        }
        .article-desc {
            color: #6c757d;
            margin-bottom: 15px;
            height: 48px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .btn-read {
            background: #343a40;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            transition: all .2s;
        }
        .btn-read:hover {
            background: #6c757d;
            color: white;
            text-decoration: none;
        }
        .footer {
            background: #343a40;
            color: white;
            padding: 40px 0;
            margin-top: 50px;
        }
        .search-box {
            max-width: 600px;
            margin: 30px auto;
        }
        .search-input {
            border-radius: 20px;
            padding: 20px;
            border: none;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
        }
        .lesson-card {
            height: 450px; /* 统一卡片高度 */
            display: flex;
            flex-direction: column;
        }
        .lesson-card .card-body {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .lesson-card .btn {
            margin-top: auto; /* 按钮固定在底部 */
        }
        .lesson-card .card-img-top {
            height: 200px;
            object-fit: cover;
        }
        .lesson-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 10px 0;
            color: #343a40;
        }
        .lesson-desc {
            color: #6c757d;
            margin-bottom: 15px;
            height: 48px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .lesson-tags {
            margin-bottom: 15px;
        }
        .lesson-tags .badge {
            margin-right: 5px;
        }
        .dropdown-item {
            padding: 8px 20px;
            color: #333;
            transition: all 0.2s;
        }
        .dropdown-item:hover {
            background-color: #f8f9fa;
            color: #2196F3;
        }
        .dropdown-item i {
            margin-right: 8px;
            width: 16px;
            text-align: center;
        }
        .user-dropdown {
            position: relative;
            display: inline-block;
        }
        
        .user-dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: #fff;
            min-width: 160px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            border-radius: 4px;
            z-index: 1000;
        }
        
        .user-dropdown:hover .user-dropdown-content {
            display: block;
        }
        
        .user-dropdown-item {
            display: block;
            padding: 12px 16px;
            color: #333;
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .user-dropdown-item:hover {
            background-color: #f8f9fa;
            color: #2196F3;
        }
        
        .user-dropdown-item i {
            margin-right: 8px;
            width: 16px;
            text-align: center;
        }

        /* AI助手相关样式 */
        :root {
            --webchat-toolbar-background-color: #2196F3;
            --webchat-toolbar-text-color: #ffffff;
        }
        .webchat-container {
            z-index: 100;
            bottom: 10px;
            right: 10px;
        }
        .webchat-bubble-tip {
            z-index: 99;
            bottom: 20px;
            right: 20px;
        }

    </style>
</head>
<body>
    <!-- 导航栏 -->
    <div th:replace="~{web/fragments/navbar :: navbar}"></div>

    <!-- 头部横幅 -->
    <div class="jumbotron text-center">
        <div class="container">
            <h1 class="display-4">开启你的学习之旅</h1>
            <p class="lead">AI辅助教学，助你成长</p>
            <div class="search-box">
                <input type="text" class="form-control search-input" placeholder="搜索课程或文章...">
            </div>
        </div>
    </div>

    <!-- 文章列表 -->
    <div class="container mt-5">
        <!-- 课程板块 -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3>精选课程</h3>
            <a th:href="@{/web/category/lesson}" class="text-primary">
                全部课程 <i class="fa fa-angle-right"></i>
            </a>
        </div>
        <div class="row">
            <div class="col-md-4" th:each="lesson : ${lessons}">
                <div class="card lesson-card">
                    <img th:if="${lesson.coverImg}" th:src="${lesson.coverImg}" class="card-img-top" alt="课程封面">
                    <div class="card-body">
                        <div class="lesson-meta">

                            <span class="ml-2"><i class="fa fa-eye"></i> <span th:text="${lesson.viewCount}">0</span></span>
                        </div>
                        <h5 class="lesson-title" th:text="${lesson.title}">课程标题</h5>
                        <p class="lesson-desc" th:text="${lesson.description}">课程描述...</p>
                        <div class="lesson-tags">
                            <span class="badge badge-info" th:each="tag : ${#strings.arraySplit(lesson.tags, ',')}" th:text="${tag}">标签</span>
                        </div>
                        <a th:href="@{'/web/lesson/' + ${lesson.lessonId}}" class="btn btn-primary mt-3">
                            开始学习 <i class="fa fa-arrow-right ml-1"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="d-flex justify-content-between align-items-center mb-4 mt-5">
            <h3>最新文章</h3>
            <a th:href="@{/web/category/article}" class="text-primary">
                全部文章 <i class="fa fa-angle-right"></i>
            </a>
        </div>
        <div class="row">
            <div class="col-md-4" th:each="article : ${articles}">
                <div class="card article-card">
                    <div class="card-body">
                        <div class="article-meta">
                            <i class="fa fa-user"></i> <span th:text="${article.createBy}">作者</span>
                            <i class="fa fa-clock-o ml-2"></i> <span th:text="${#dates.format(article.createTime, 'yyyy-MM-dd')}">日期</span>

                        </div>
                        <h5 class="article-title" th:text="${article.title}">文章标题</h5>
                        <p class="article-desc" th:text="${article.remark}">文章描述...</p>
                        <a th:href="@{'/web/article/' + ${article.articleId}}" class="btn btn-read">
                            阅读全文 <i class="fa fa-arrow-right ml-1"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container text-center">
            <p>© 2024 课程学习平台. All rights reserved.</p>
            <div class="mt-3">
                <a href="#" class="text-white mx-2"><i class="fa fa-weixin fa-lg"></i></a>
                <a href="#" class="text-white mx-2"><i class="fa fa-qq fa-lg"></i></a>
                <a href="#" class="text-white mx-2"><i class="fa fa-weibo fa-lg"></i></a>
            </div>
        </div>
    </footer>
    <!-- Scripts -->
    <script th:src="@{/js/jquery.min.js}"></script>
    <script th:src="@{/js/bootstrap.min.js}"></script>
    <script>
        $(function() {
            // 搜索功能
            $('.search-input').on('keyup', function(e) {
                if(e.keyCode === 13) {
                    var keyword = $(this).val();
                    if(keyword) {
                        window.location.href = ctx + "web/search?keyword=" + encodeURIComponent(keyword);
                    }
                }
            });
        });
    </script>
    <div th:replace="~{web/fragments/ai-chat :: ai-chat}"></div>
</body>
</html>
