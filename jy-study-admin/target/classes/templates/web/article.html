<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${article.title} + ' - 课程学习平台'">文章标题</title>
    <link href="/css/bootstrap-v4/bootstrap.min.css" rel="stylesheet">
    <link href="/css/font-awesome.min.css" rel="stylesheet">
    <link th:href="@{/css/animate.min.css}" rel="stylesheet"/>
    <link th:href="@{/css/style.min.css}" rel="stylesheet"/>
    <link th:href="@{/ruoyi/css/ry-ui.css}" rel="stylesheet"/>
    <link th:href="@{/css/web-common.css}" rel="stylesheet"/>
    <meta name="article-id" th:content="${article.articleId}">
    <style>
        .article-header {
            background: linear-gradient(45deg, #6c757d, #343a40);
            color: white;
            padding: 60px 0;
        }
        .article-cover {
            width: 100%;
            max-width: 300px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,.2);
        }
        .article-title {
            font-size: 2rem;
            margin: 20px 0;
        }
        .article-meta {
            color: #dee2e6;
            margin-bottom: 20px;
        }
        .article-meta span {
            margin-right: 20px;
        }
        .article-tags .badge {
            margin-right: 8px;
            padding: 8px 15px;
            font-size: 0.9rem;
        }
        .article-content {
            padding: 40px 0;
        }
        .article-description {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #495057;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 10px rgba(0,0,0,.05);
            overflow: hidden;
        }
        .article-description::after {
            content: "";
            display: block;
            clear: both;
        }
        .article-description p,
        .article-description div,
        .article-description section,
        .article-description article {
            float: none !important;
            width: auto !important;
            max-width: 100% !important;
        }
        .article-description img,
        .article-description table,
        .article-description iframe,
        .article-description video {
            max-width: 100% !important;
            height: auto;
        }
        .article-actions {
            margin: 30px 0;
        }
        .btn-action {
            margin-right: 15px;
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,.1);
        }
        .btn-action.active {
            background-color: #007bff;
            color: white;
        }
        .footer {
            background: #343a40;
            color: white;
            padding: 40px 0;
            margin-top: 50px;
        }
        body {
            background-color: #f8f9fa;
            font-family: "Microsoft YaHei", sans-serif;
        }
        .navbar {
            box-shadow: 0 2px 4px rgba(0,0,0,.08);
        }
        .btn-like, .btn-collect {
            padding: 10px 30px;
            border-radius: 25px;
            transition: all .3s ease;
            border: 2px solid;
            background: transparent;
            font-weight: 500;
        }
        
        .btn-like {
            color: #28a745;
            border-color: #28a745;
        }
        
        .btn-like:hover {
            background: rgba(40, 167, 69, 0.1);
            color: #28a745;
        }
        
        .btn-like.active {
            background: #28a745;
            color: white;
            border-color: #28a745;
        }
        
        .btn-collect {
            color: #5b73e8;
            border-color: #5b73e8;
        }
        
        .btn-collect:hover {
            background: rgba(91, 115, 232, 0.1);
            color: #5b73e8;
        }

        .btn-collect.active {
            background: #5b73e8;
            color: white;
            border-color: #5b73e8;
        }

        .btn-like i, .btn-collect i {
            margin-right: 5px;
        }

        .btn-like.active i, .btn-collect.active i {
            animation: bounce 0.5s;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .analyzing {
            font-family: monospace;
            white-space: pre-wrap;
            line-height: 1.5;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 5px;
            border-left: 4px solid #007bff;
        }
        
        .analysis-content {
            min-height: 100px;
            line-height: 1.6;
            font-size: 1.1rem;
        }
        
        .analysis-content.loading {
            position: relative;
        }
        
        .analysis-content.loading:after {
            content: "正在分析中...";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #6c757d;
        }

        /* 添加新的布局样式 */
        .content-wrapper {
            display: flex;
            position: relative;
            min-height: calc(100vh - 400px); /* 减去header和footer的高度 */
        }
        
        .article-content {
            width: 75%;
            transition: width 0.3s ease;
            padding: 40px 20px 40px 40px;
        }
        
        .article-content.expanded {
            width: 95%;
        }
        
        .btn-analyze {
            padding: 10px 30px;
            border-radius: 25px;
            transition: all .3s ease;
            border: 2px solid;
            background: transparent;
            font-weight: 500;
            color: #6f42c1;
            border-color: #6f42c1;
        }
        
        .btn-analyze:hover {
            background: rgba(111, 66, 193, 0.1);
            color: #6f42c1;
        }
        
        .btn-analyze.active {
            background: #6f42c1;
            color: white;
            border-color: #6f42c1;
        }

        .btn-voice {
            padding: 10px 30px;
            border-radius: 25px;
            transition: all .3s ease;
            border: 2px solid;
            background: transparent;
            font-weight: 500;
            color: #17a2b8;
            border-color: #17a2b8;
        }

        .btn-voice:hover {
            background: rgba(23, 162, 184, 0.1);
            color: #17a2b8;
        }

        .btn-voice.active {
            background: #17a2b8;
            color: white;
            border-color: #17a2b8;
        }

        .btn-voice i {
            margin-right: 5px;
        }

        .btn-voice.loading {
            cursor: wait;
        }

        /* 试题预览样式 */
        .questions-preview {
            margin-top: 40px;
            padding: 30px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 10px rgba(0,0,0,.05);
        }
        .questions-preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e9ecef;
        }
        .questions-preview-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #343a40;
        }
        .questions-preview-content {
            margin-bottom: 20px;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            position: relative;
        }
        .preview-text {
            color: #495057;
            line-height: 1.6;
            font-size: 1rem;
            white-space: pre-wrap;
            position: relative;
        }
        .preview-text::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: linear-gradient(transparent, #f8f9fa);
            pointer-events: none;
        }
        .view-all-questions {
            text-align: center;
            margin-top: 20px;
        }
        .btn-view-all {
            padding: 10px 30px;
            border-radius: 25px;
            background-color: #007bff;
            color: white;
            border: none;
            transition: all 0.3s;
        }
        .btn-view-all:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,.1);
        }
        @media (max-width: 992px) {
            .article-content {
                width: 100%;
                padding: 32px 0;
            }
        }
    </style>
</head>
<body>
    <!-- 基础JS依赖 -->
    <script th:src="@{/js/jquery.min.js}"></script>
    <script th:src="@{/js/bootstrap.min.js}"></script>
    <script th:src="@{/js/common.js}"></script>

    <!-- 定义ctx变量 -->
    <script th:inline="javascript">
        var ctx = /*[[@{/}]]*/'';
        var prefix = ctx + "web/interaction";
        window.isAuthenticated = [[${@shiroService.getPrincipal() != null}]];
        var articleVoiceUrl = /*[[${article.voiceUrl}]]*/ null;
    </script>
    
    <!-- 其他JS依赖 -->
    <script th:src="@{/ajax/libs/layer/layer.min.js}"></script>
    <script th:src="@{/ruoyi/js/common.js}"></script>
    <script th:src="@{/ruoyi/js/ry-ui.js}"></script>
    <!-- 使用th:replace引入导航栏 -->
    <div th:replace="web/fragments/navbar :: navbar"></div>

    <!-- 文章头部 -->
    <div class="article-header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-4">
                    <img th:if="${article.coverImg}" th:src="${article.coverImg}" class="article-cover" alt="文章封面">
<!--                    假如没有图片-->
                    <img th:if="${article.coverImg == null}" th:src="@{/img/default-article.png}" class="article-cover" alt="默认封面">
                </div>
                <div class="col-md-8">
                    <h1 class="article-title" th:text="${article.title}">文章标题</h1>
                    <div class="article-meta">
                        <span><i class="fa fa-user"></i> <span th:text="${article.createBy}">作者</span></span>
                        <span><i class="fa fa-clock-o"></i> <span th:text="${#dates.format(article.createTime, 'yyyy-MM-dd')}">日期</span></span>
                        <span><i class="fa fa-eye"></i> <span th:text="${article.viewCount}">0</span> 次浏览</span>
                    </div>
                    <div class="article-tags">

                        <span class="badge badge-info" th:if="${article.tags != null}" th:each="tag : ${#strings.arraySplit(article.tags, ',')}" th:text="${tag}">标签</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 修改文章内容和AI分析的布局结构 -->
    <!-- 将原来的文章内容和AI分析部分替换为以下结构 -->
    <div class="content-wrapper">
        <!-- 文章内容 -->
        <div class="article-content">
            <div class="container">
                <div class="article-description" th:utext="${article.content}">
                    文章内容...
                </div>
                <!-- 试题预览 -->
                <div class="questions-preview" th:if="${aiCoze != null}">
                    <div class="questions-preview-header">
                        <div class="questions-preview-title">
                            <i class="fa fa-question-circle"></i> 相关试题
                        </div>
                        <div class="questions-count">
                            共 <span th:text="${aiCoze.questionNum}">0</span> 道题目
                        </div>
                    </div>
                    <div class="questions-preview-content">
                        <div class="preview-text" th:text="${previewContent}">
                            题目预览内容...
                        </div>
                    </div>
                    <div class="view-all-questions">
                        <button class="btn btn-view-all" onclick="viewAllQuestions()">
                            <i class="fa fa-list-alt"></i> 查看全部试题
                        </button>
                    </div>
                </div>
                <div class="article-actions text-center mb-4">
                    <button class="btn btn-like mr-3" onclick="toggleLike()" id="likeBtn">
                        <i class="fa fa-thumbs-up"></i> 点赞 <span id="likeCount" th:text="${article.likeCount}">0</span>
                    </button>
                    <button class="btn btn-collect mr-3" onclick="toggleCollect()" id="collectBtn">
                        <i class="fa fa-star"></i> 收藏 <span id="collectCount" th:text="${article.collectCount}">0</span>
                    </button>
                    <button class="btn btn-voice mr-3" id="voiceBtn" onclick="toggleVoice()">
                        <i class="fa fa-volume-up"></i> AI朗读
                    </button>
                    <button class="btn btn-analyze" onclick="analyzeArticle()" id="analyzeBtn">
                        <i class="fa fa-robot"></i> AI解析
                    </button>
                </div>
                <div th:replace="~{web/fragments/comments :: comments(commentPrefix='article', commentType='2', targetId=${article.articleId})}"></div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer bg-dark text-white py-4">
        <div class="container text-center">
            <p>© 2024 课程学习平台. All rights reserved.</p>
        </div>
    </footer>

    <div th:replace="~{web/fragments/ai-chat :: ai-chat}"></div>

    <audio id="voicePlayer" style="display: none;"></audio>

    <script>
    var isLiked = false;
    var isCollected = false;

    $(function() {
        // 获取当前用户的点赞和收藏状态
        $.ajax({
            url: prefix + "/status",
            type: "GET",
            data: {
                type: "2",
                targetId: [[${article.articleId}]]
            },
            success: function(res) {
                if (res.code == 0) {
                    isLiked = res.data.liked;
                    isCollected = res.data.collected;
                    updateButtonStatus();
                }
            },
            error: function(xhr, status, error) {
                console.log("获取状态失败：" + error);
            }
        });

    });

    function toggleLike() {
        if (!isLiked) {
            handleLike("2", [[${article.articleId}]], function() {
                isLiked = true;
                $("#likeCount").text(parseInt($("#likeCount").text()) + 1);
                updateButtonStatus();
            });
        } else {
            handleUnlike("2", [[${article.articleId}]], function() {
                isLiked = false;
                $("#likeCount").text(parseInt($("#likeCount").text()) - 1);
                updateButtonStatus();
            });
        }
    }

    function toggleCollect() {
        if (!isCollected) {
            handleCollect("2", [[${article.articleId}]], function() {
                isCollected = true;
                $("#collectCount").text(parseInt($("#collectCount").text()) + 1);
                updateButtonStatus();
            });
        } else {
            handleUncollect("2", [[${article.articleId}]], function() {
                isCollected = false;
                $("#collectCount").text(parseInt($("#collectCount").text()) - 1);
                updateButtonStatus();
            });
        }
    }

    function updateButtonStatus() {
        if (isLiked) {
            $("#likeBtn").addClass("active");
            $("#likeBtn").html('<i class="fa fa-thumbs-up"></i> 已赞 <span id="likeCount">' + $("#likeCount").text() + '</span>');
        } else {
            $("#likeBtn").removeClass("active");
            $("#likeBtn").html('<i class="fa fa-thumbs-up"></i> 点赞 <span id="likeCount">' + $("#likeCount").text() + '</span>');
        }
        if (isCollected) {
            $("#collectBtn").addClass("active");
            $("#collectBtn").html('<i class="fa fa-star"></i> 已收藏 <span id="collectCount">' + $("#collectCount").text() + '</span>');
        } else {
            $("#collectBtn").removeClass("active");
            $("#collectBtn").html('<i class="fa fa-star"></i> 收藏 <span id="collectCount">' + $("#collectCount").text() + '</span>');
        }
    }

    // 记录浏览量
    $(function() {
        $.ajax({
            url: prefix + "/view",
            type: "POST",
            data: {
                type: "2",
                targetId: [[${article.articleId}]]
            },
            success: function(res) {
                if (res.code != 0) {
                    console.log("浏览量记录失败：" + res.msg);
                }
            },
            error: function(xhr, status, error) {
                console.log("浏览量记录请求失败：" + error);
            }
        });
    });

    function analyzeArticle() {
        // 如果需要登录,直接返回
        if(handleLoginRequired()) {
            return;
        }
        
        const analyzeBtn = $("#analyzeBtn");
        
        // 禁用按钮
        analyzeBtn.prop('disabled', true);
        analyzeBtn.html('<i class="fa fa-spinner fa-spin"></i> 分析中...');
        
        // 检查函数是否存在
        if (typeof window.triggerArticleAnalysis !== 'function') {
            console.error('triggerArticleAnalysis function not found');
            analyzeBtn.prop('disabled', false);
            analyzeBtn.html('<i class="fa fa-robot"></i> AI解析');
            $.modal.alertError("系统错误，请刷新页面后重试");
            return;
        }
        
        // 触发AI聊天框的文章分析
        window.triggerArticleAnalysis([[${article.articleId}]], function() {
            // 分析完成后恢复按钮状态
            analyzeBtn.prop('disabled', false);
            analyzeBtn.html('<i class="fa fa-robot"></i> AI解析');
        });
    }

    function toggleVoice() {
        // 如果需要登录，直接返回
        if(handleLoginRequired()) {
            return;
        }
        
        const voiceBtn = $("#voiceBtn");
        const voicePlayer = $("#voicePlayer")[0];

        // 如果已经有音频在播放，则停止播放
        if(voicePlayer.src && !voicePlayer.paused) {
            voicePlayer.pause();
            voiceBtn.removeClass("active");
            voiceBtn.html('<i class="fa fa-volume-up"></i> AI朗读');
            return;
        }
        // 如果已经有语音URL，直接播放
        if (articleVoiceUrl) {
            playVoice(articleVoiceUrl);
            return;
        }
        // 否则生成新的语音
        voiceBtn.addClass("loading");
        voiceBtn.prop("disabled", true);
        voiceBtn.html('<i class="fa fa-spinner fa-spin"></i> 生成中...');
        $.ajax({
            url: ctx + "tts/generate/voice",
            type: "POST",
            data: {
                articleId: [[${article.articleId}]]
            },
            success: function(res) {
                if(res.code === 0) {
                    playVoice(res.data);
                } else {
                    $.modal.alertError("生成失败：" + res.msg);
                }
            },
            error: function() {
                $.modal.alertError("生成请求失败");
            },
            complete: function() {
                voiceBtn.removeClass("loading");
                voiceBtn.prop("disabled", false);
                voiceBtn.html('<i class="fa fa-volume-up"></i> AI朗读');
            }
        });

    }
    
    function playVoice(url) {
        const voiceBtn = $("#voiceBtn");
        const voicePlayer = $("#voicePlayer")[0];
        
        voicePlayer.src = url;
        voicePlayer.play();
        
        voiceBtn.addClass("active");
        voiceBtn.html('<i class="fa fa-pause"></i> 停止朗读');
        
        // 播放结束时重置按钮状态
        voicePlayer.onended = function() {
            voiceBtn.removeClass("active");
            voiceBtn.html('<i class="fa fa-volume-up"></i> AI朗读');
        };
    }

    function viewAllQuestions() {
        var url = ctx + "web/questions/" + [[${article.articleId}]];
        window.location.href = url;
    }
    </script>
</body>
</html>
